apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-configs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/anomaly51/argocd-learn-gitops.git
        revision: main
        files:
          - path: platform-apps/configs/*.yaml
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      labels:
        layer: platform-configs
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: argocd-learn-apps
      source:
        repoURL: https://github.com/anomaly51/argocd-learn-gitops.git
        targetRevision: main
        path: "{{.path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
