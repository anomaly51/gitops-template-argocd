apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-controllers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/anomaly51/argocd-learn-gitops.git
        revision: main
        files:
          - path: platform-apps/controllers/*.yaml
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      labels:
        layer: platform-controllers
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: workflow-2-apps
      source:
        repoURL: "{{.repoURL}}"
        chart: "{{.chart}}"
        targetRevision: "{{.targetRevision}}"
        helm:
          releaseName: "{{.releaseName}}"
          values: "{{.values}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
