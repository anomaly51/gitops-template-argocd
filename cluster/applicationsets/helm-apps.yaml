apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: helm-apps
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
    - git:
        repoURL: https://github.com/anomaly51/argocd-learn-gitops.git
        revision: main
        files:
          - path: helm-apps/*.yaml
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: argocd-learn-apps
      source:
        repoURL: "{{.repoURL}}"
        chart: "{{.chart}}"
        targetRevision: "{{.targetRevision}}"
        helm:
          releaseName: "{{.releaseName}}"
          parameters:
            - name: replicaCount
              value: "{{.replicaCount}}"
            - name: service.type
              value: "{{.serviceType}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd-learn-helm
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

