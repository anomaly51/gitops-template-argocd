apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workflow-2-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  description: Argo CD GitOps template project. Add application sources and destinations when enabling workloads.
  sourceRepos:
    - https://github.com/anomaly51/gitops-template-argocd.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
