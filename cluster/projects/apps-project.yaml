apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argocd-learn-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Demo applications managed by this single-cluster GitOps repository.
  sourceRepos:
    - https://github.com/anomaly51/argocd-learn-gitops.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd-learn-lab
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"

