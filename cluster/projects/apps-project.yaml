apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: workflow-2-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  description: Workflow 2 platform and training applications managed by Argo CD.
  sourceRepos:
    - https://github.com/anomaly51/argocd-learn-gitops.git
    - https://github.com/catdevdev/hermes-agent-gitops.git
    - https://charts.jetstack.io
    - https://charts.external-secrets.io
    - https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
    - https://kubernetes-sigs.github.io/external-dns/
    - https://stefanprodan.github.io/podinfo
    - https://charts.bitnami.com/bitnami
    - https://prometheus-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: cert-manager
    - server: https://kubernetes.default.svc
      namespace: external-secrets
    - server: https://kubernetes.default.svc
      namespace: nfs-system
    - server: https://kubernetes.default.svc
      namespace: external-dns
    - server: https://kubernetes.default.svc
      namespace: cloudflared
    - server: https://kubernetes.default.svc
      namespace: kube-system
    - server: https://kubernetes.default.svc
      namespace: workflow-2-lab
    - server: https://kubernetes.default.svc
      namespace: workflow-2-helm
    - server: https://kubernetes.default.svc
      namespace: hermes-agent
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
