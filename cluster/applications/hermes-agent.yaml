apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: workflow-2
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: workflow-2-apps
  source:
    repoURL: https://github.com/anomaly51/argocd-learn-gitops.git
    targetRevision: main
    path: apps/hermes-agent
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes-agent
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
