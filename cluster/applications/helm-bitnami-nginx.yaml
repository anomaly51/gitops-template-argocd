apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-bitnami-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: argocd-learn-apps
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: nginx
    targetRevision: 24.0.0
    helm:
      releaseName: helm-bitnami-nginx
      valuesObject:
        replicaCount: 1
        service:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd-learn-helm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

