apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-learn-smoke
  labels:
    app.kubernetes.io/name: argocd-learn-smoke
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-learn-smoke
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-learn-smoke
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80

