apiVersion: batch/v1
kind: Job
metadata:
  name: batch-hello
  labels:
    app.kubernetes.io/name: batch-hello
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: batch-hello
    spec:
      restartPolicy: Never
      containers:
        - name: hello
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - echo "batch-hello completed from GitOps"

