apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stateful-nginx
  labels:
    app.kubernetes.io/name: stateful-nginx
spec:
  serviceName: stateful-nginx
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: stateful-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: stateful-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80

