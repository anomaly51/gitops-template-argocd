apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-nginx
  labels:
    app.kubernetes.io/name: static-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: static-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: static-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: content
          configMap:
            name: static-nginx-content

