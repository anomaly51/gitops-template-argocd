apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-hello
  labels:
    app.kubernetes.io/name: cron-hello
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cron-hello
        spec:
          restartPolicy: Never
          containers:
            - name: hello
              image: busybox:1.36.1
              command:
                - sh
                - -c
                - date && echo "cron-hello scheduled by GitOps"

