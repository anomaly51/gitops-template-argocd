apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
  labels:
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/part-of: workflow-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-agent
  template:
    metadata:
      annotations:
        hermes-agent/config-version: "2026-05-19-logging"
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
    spec:
      containers:
        - name: agent
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
          args:
            - |
              pip install --no-cache-dir fastapi uvicorn[standard] httpx pydantic
              exec python /app/app.py
          env:
            - name: AGENT_NAME
              value: hermes-agent
            - name: PUBLIC_URL
              value: https://hermes-agent.api-api-api.com
          envFrom:
            - secretRef:
                name: hermes-agent-env
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: hermes-agent-app
