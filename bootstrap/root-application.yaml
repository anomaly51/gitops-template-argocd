apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-learn-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/anomaly51/argocd-learn-gitops.git
    targetRevision: main
    path: clusters/in-cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false

