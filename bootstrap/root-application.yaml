apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workflow-2-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/anomaly51/gitops-template-argocd.git
    targetRevision: main
    path: cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
