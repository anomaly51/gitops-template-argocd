name: external-dns
repoURL: https://kubernetes-sigs.github.io/external-dns/
chart: external-dns
targetRevision: 1.21.1
releaseName: external-dns
namespace: external-dns
values: |
  provider:
    name: cloudflare
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: cloudflare-api-token
          key: api-token
  cloudflare:
    proxied: true
  extraArgs:
    - --cloudflare-proxied
  domainFilters:
    - api-api-api.com
  txtOwnerId: argo-investigate
  sources:
    - ingress
  policy: sync

